<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Black Hole Information Operator</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(8, 11, 17, 0.72);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f5f7fb;
      --muted: #aeb7c6;
      --orange: #ff6b22;
      --cyan: #4eeaff;
      --green: #5dff9b;
      --red: #ff372c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #070910;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    #app {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 105, 26, 0.16), transparent 27rem),
        linear-gradient(180deg, #080a11 0%, #111721 58%, #08090e 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: absolute;
      left: 18px;
      right: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 54px;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .top {
      top: 16px;
      justify-content: space-between;
    }

    .bottom {
      bottom: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .title {
      font-size: 15px;
      font-weight: 740;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(72px, 1fr));
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      height: 34px;
    }

    button {
      appearance: none;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      padding: 0 10px;
      height: 32px;
      font: inherit;
      font-size: 12px;
      font-weight: 680;
      cursor: pointer;
    }

    button:last-child {
      border-right: 0;
    }

    button.active {
      color: #081018;
      background: linear-gradient(180deg, #80f7ff, #4eeaff);
    }

    label {
      display: grid;
      grid-template-columns: auto 104px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 104px;
      accent-color: var(--cyan);
    }

    .metric {
      display: grid;
      gap: 2px;
      min-width: 116px;
      padding: 0 12px;
      border-right: 1px solid var(--line);
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
    }

    .metric strong {
      color: var(--text);
      font-size: 17px;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .status {
      position: absolute;
      right: 18px;
      top: 86px;
      width: min(330px, calc(100vw - 36px));
      padding: 12px;
      background: rgba(8, 11, 17, 0.62);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .status b {
      color: var(--text);
      font-weight: 760;
    }

    @media (max-width: 820px) {
      .hud {
        left: 10px;
        right: 10px;
      }

      .top {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
      }

      .bottom {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric {
        min-width: 0;
        border-right: 0;
      }

      .status {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="glCanvas"></canvas>

    <section class="hud top" aria-label="Simulation controls">
      <div class="title">Black Hole Information Operator</div>
      <div class="controls">
        <div class="segmented" role="group" aria-label="Operator mode">
          <button type="button" class="active" data-mode="unitary">Unitary</button>
          <button type="button" data-mode="projection">Projection</button>
          <button type="button" data-mode="kernel">Kernel</button>
        </div>
        <label>Curvature <input id="curvature" type="range" min="0.62" max="1.75" step="0.01" value="1.00"></label>
        <label>Flux <input id="flux" type="range" min="0.35" max="1.8" step="0.01" value="1.00"></label>
        <label>Rank <input id="rank" type="range" min="0.12" max="1.00" step="0.01" value="0.42"></label>
      </div>
    </section>

    <section class="status" aria-live="polite">
      <b id="modeName">Unitary</b><br>
      <span id="modeCopy">The global state rotates through phase and curvature while the norm remains approximately fixed.</span>
    </section>

    <section class="hud bottom" aria-label="Information metrics">
      <div class="metric"><span>||I'|| / ||I||</span><strong id="normMetric">1.000</strong></div>
      <div class="metric"><span>S / log N</span><strong id="entropyMetric">0.000</strong></div>
      <div class="metric"><span>L</span><strong id="lossMetric">0.000</strong></div>
      <div class="metric"><span>rho(T)</span><strong id="rhoMetric">1.000</strong></div>
      <div class="metric"><span>particles</span><strong id="particleMetric">0</strong></div>
    </section>
  </div>

  <script>
    "use strict";

    const canvas = document.getElementById("glCanvas");
    const gl = canvas.getContext("webgl", { antialias: true, alpha: false });

    if (!gl) {
      document.body.innerHTML = "<div style='padding:24px;color:white;font-family:sans-serif'>WebGL is unavailable in this browser.</div>";
      throw new Error("WebGL unavailable");
    }

    const vertexSource = `
      attribute vec3 aPosition;
      attribute vec4 aColor;
      uniform mat4 uMVP;
      uniform float uPointSize;
      varying vec4 vColor;
      void main() {
        gl_Position = uMVP * vec4(aPosition, 1.0);
        gl_PointSize = uPointSize;
        vColor = aColor;
      }
    `;

    const fragmentSource = `
      precision mediump float;
      uniform int uRoundPoints;
      varying vec4 vColor;
      void main() {
        if (uRoundPoints == 1) {
          vec2 d = gl_PointCoord - vec2(0.5);
          float r = length(d);
          if (r > 0.5) discard;
          float edge = smoothstep(0.5, 0.36, r);
          gl_FragColor = vec4(vColor.rgb, vColor.a * edge);
        } else {
          gl_FragColor = vColor;
        }
      }
    `;

    function compileShader(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader) || "Shader compile failed");
      }
      return shader;
    }

    const program = gl.createProgram();
    gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vertexSource));
    gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fragmentSource));
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(program) || "Program link failed");
    }
    gl.useProgram(program);

    const locations = {
      position: gl.getAttribLocation(program, "aPosition"),
      color: gl.getAttribLocation(program, "aColor"),
      mvp: gl.getUniformLocation(program, "uMVP"),
      pointSize: gl.getUniformLocation(program, "uPointSize"),
      roundPoints: gl.getUniformLocation(program, "uRoundPoints")
    };

    const state = {
      mode: "unitary",
      time: 0,
      curvature: 1,
      flux: 1,
      rank: 0.42,
      gridDirty: true,
      yaw: -0.72,
      pitch: 0.32,
      distance: 11.2,
      dragging: false,
      lastX: 0,
      lastY: 0
    };

    const particles = [];
    const particleCount = 128;
    const horizonRadius = 0.98;
    const strideBytes = 7 * 4;
    let gridBuffer = null;
    let gridVertexCount = 0;

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function mix(a, b, t) {
      return a + (b - a) * t;
    }

    function position(x, y, z) {
      return [x, z, y];
    }

    function pushVertex(out, x, y, z, r, g, b, a) {
      const p = position(x, y, z);
      out.push(p[0], p[1], p[2], r, g, b, a);
    }

    function well(x, y) {
      const z = -2.85 * state.curvature / Math.sqrt(x * x + y * y + 0.18);
      return Math.max(z, -6.8);
    }

    function curvatureColor(x, y) {
      const r2 = x * x + y * y;
      const t = clamp(1.4 / Math.pow(r2 + 0.26, 1.05), 0, 1);
      return [
        mix(0.20, 1.00, t),
        mix(0.78, 0.28, t),
        mix(0.96, 0.05, t),
        mix(0.28, 0.72, t)
      ];
    }

    function makeBuffer(data) {
      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(data), gl.DYNAMIC_DRAW);
      return buffer;
    }

    function updateBuffer(buffer, data) {
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(data), gl.DYNAMIC_DRAW);
    }

    function bindBuffer(buffer) {
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.enableVertexAttribArray(locations.position);
      gl.enableVertexAttribArray(locations.color);
      gl.vertexAttribPointer(locations.position, 3, gl.FLOAT, false, strideBytes, 0);
      gl.vertexAttribPointer(locations.color, 4, gl.FLOAT, false, strideBytes, 3 * 4);
    }

    function rebuildGrid() {
      const out = [];
      const extent = 6.3;
      const lines = 31;
      const samples = 118;
      for (let i = 0; i < lines; i += 1) {
        const fixed = -extent + (2 * extent * i) / (lines - 1);
        for (let j = 0; j < samples - 1; j += 1) {
          const x0 = -extent + (2 * extent * j) / (samples - 1);
          const x1 = -extent + (2 * extent * (j + 1)) / (samples - 1);
          let c = curvatureColor(x0, fixed);
          pushVertex(out, x0, fixed, well(x0, fixed), c[0], c[1], c[2], c[3]);
          c = curvatureColor(x1, fixed);
          pushVertex(out, x1, fixed, well(x1, fixed), c[0], c[1], c[2], c[3]);

          const y0 = -extent + (2 * extent * j) / (samples - 1);
          const y1 = -extent + (2 * extent * (j + 1)) / (samples - 1);
          c = curvatureColor(fixed, y0);
          pushVertex(out, fixed, y0, well(fixed, y0), c[0], c[1], c[2], c[3]);
          c = curvatureColor(fixed, y1);
          pushVertex(out, fixed, y1, well(fixed, y1), c[0], c[1], c[2], c[3]);
        }
      }

      if (!gridBuffer) {
        gridBuffer = makeBuffer(out);
      } else {
        updateBuffer(gridBuffer, out);
      }
      gridVertexCount = out.length / 7;
      state.gridDirty = false;
    }

    function resetParticle(p, index) {
      p.r = 3.9 + Math.random() * 2.4;
      p.theta = Math.random() * Math.PI * 2;
      p.phase = Math.random() * Math.PI * 2;
      p.spin = index % 2 === 0 ? 1 : -1;
      p.info = 0.88 + Math.random() * 0.24;
      p.trail = [];
    }

    for (let i = 0; i < particleCount; i += 1) {
      const p = {};
      resetParticle(p, i);
      p.r *= 0.4 + 0.6 * Math.random();
      particles.push(p);
    }

    function particlePosition(p) {
      const lens = 0.18 * Math.sin(state.time * 2.1 + p.phase);
      const x = p.r * Math.cos(p.theta);
      const y = p.r * Math.sin(p.theta);
      const z = well(x, y) + 0.34 + lens;
      return [x, y, z];
    }

    function updateParticles(dt) {
      for (let i = 0; i < particles.length; i += 1) {
        const p = particles[i];
        const inward = (0.22 + 0.85 / (p.r + 0.45)) * state.flux;
        const angular = p.spin * (0.34 + 1.85 / (p.r * p.r + 0.34));
        p.r -= inward * dt;
        p.theta += angular * dt;

        const absorption = Math.exp(-(p.r * p.r) / 2.2);
        if (state.mode === "unitary") {
          p.info = 0.94 + 0.06 * Math.sin(state.time * 3.2 + p.phase);
        } else if (state.mode === "projection") {
          const drain = (1 - state.rank) * (p.r < 2.8 ? 0.92 : 0.12);
          p.info *= Math.exp(-drain * dt);
        } else {
          p.info *= Math.exp(-(0.08 + 1.35 * absorption) * dt);
        }

        const pos = particlePosition(p);
        p.trail.push([pos[0], pos[1], pos[2], p.info]);
        if (p.trail.length > 26) p.trail.shift();

        if (p.r < horizonRadius * 0.54 || p.info < 0.025) {
          resetParticle(p, i);
        }
      }
    }

    function modeColor(info) {
      const a = clamp(info, 0.05, 1.0);
      if (state.mode === "unitary") return [0.30, 0.93, 1.0, 0.92 * a];
      if (state.mode === "projection") return [1.0, 0.58, 0.12, 0.88 * a];
      return [0.56, 1.0, 0.62, 0.86 * a];
    }

    function buildParticleBuffers() {
      const points = [];
      const trails = [];
      for (const p of particles) {
        const pos = particlePosition(p);
        const c = modeColor(p.info);
        pushVertex(points, pos[0], pos[1], pos[2], c[0], c[1], c[2], c[3]);

        for (let i = 0; i < p.trail.length - 1; i += 1) {
          const a = p.trail[i];
          const b = p.trail[i + 1];
          const age = i / Math.max(1, p.trail.length - 1);
          const alpha = 0.08 + 0.42 * age * clamp(b[3], 0.02, 1);
          const tc = modeColor(b[3]);
          pushVertex(trails, a[0], a[1], a[2], tc[0], tc[1], tc[2], alpha);
          pushVertex(trails, b[0], b[1], b[2], tc[0], tc[1], tc[2], alpha);
        }
      }
      return { points, trails };
    }

    function buildAccretionDisk() {
      const out = [];
      const rings = 12;
      const samples = 180;
      for (let rIndex = 0; rIndex < rings; rIndex += 1) {
        const radius = 1.34 + rIndex * 0.135;
        for (let i = 0; i < samples; i += 1) {
          const a0 = (i / samples) * Math.PI * 2 + state.time * (0.32 + 0.02 * rIndex);
          const a1 = ((i + 1) / samples) * Math.PI * 2 + state.time * (0.32 + 0.02 * rIndex);
          const yScale = 0.58;
          const z0 = -0.08 + 0.07 * Math.sin(4.0 * a0 + rIndex);
          const z1 = -0.08 + 0.07 * Math.sin(4.0 * a1 + rIndex);
          const heat = rIndex / (rings - 1);
          const color = [1.0, mix(0.16, 0.74, heat), 0.04, mix(0.62, 0.22, heat)];
          pushVertex(out, radius * Math.cos(a0), yScale * radius * Math.sin(a0), z0, color[0], color[1], color[2], color[3]);
          pushVertex(out, radius * Math.cos(a1), yScale * radius * Math.sin(a1), z1, color[0], color[1], color[2], color[3]);
        }
      }
      return out;
    }

    function buildHorizon() {
      const out = [];
      const samples = 220;
      const hz = well(horizonRadius, 0) + 0.02;
      for (let i = 0; i < samples; i += 1) {
        const a0 = (i / samples) * Math.PI * 2;
        const a1 = ((i + 1) / samples) * Math.PI * 2;
        pushVertex(out, horizonRadius * Math.cos(a0), horizonRadius * Math.sin(a0), hz, 1, 0.08, 0.02, 0.95);
        pushVertex(out, horizonRadius * Math.cos(a1), horizonRadius * Math.sin(a1), hz, 1, 0.08, 0.02, 0.95);
      }
      return out;
    }

    function mat4Perspective(fovy, aspect, near, far) {
      const f = 1 / Math.tan(fovy / 2);
      const nf = 1 / (near - far);
      return new Float32Array([
        f / aspect, 0, 0, 0,
        0, f, 0, 0,
        0, 0, (far + near) * nf, -1,
        0, 0, 2 * far * near * nf, 0
      ]);
    }

    function vec3Normalize(v) {
      const len = Math.hypot(v[0], v[1], v[2]) || 1;
      return [v[0] / len, v[1] / len, v[2] / len];
    }

    function vec3Cross(a, b) {
      return [
        a[1] * b[2] - a[2] * b[1],
        a[2] * b[0] - a[0] * b[2],
        a[0] * b[1] - a[1] * b[0]
      ];
    }

    function vec3Dot(a, b) {
      return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
    }

    function mat4LookAt(eye, center, up) {
      const z = vec3Normalize([eye[0] - center[0], eye[1] - center[1], eye[2] - center[2]]);
      const x = vec3Normalize(vec3Cross(up, z));
      const y = vec3Cross(z, x);
      return new Float32Array([
        x[0], y[0], z[0], 0,
        x[1], y[1], z[1], 0,
        x[2], y[2], z[2], 0,
        -vec3Dot(x, eye), -vec3Dot(y, eye), -vec3Dot(z, eye), 1
      ]);
    }

    function mat4Multiply(a, b) {
      const out = new Float32Array(16);
      const a00 = a[0], a01 = a[1], a02 = a[2], a03 = a[3];
      const a10 = a[4], a11 = a[5], a12 = a[6], a13 = a[7];
      const a20 = a[8], a21 = a[9], a22 = a[10], a23 = a[11];
      const a30 = a[12], a31 = a[13], a32 = a[14], a33 = a[15];

      let b0 = b[0], b1 = b[1], b2 = b[2], b3 = b[3];
      out[0] = b0 * a00 + b1 * a10 + b2 * a20 + b3 * a30;
      out[1] = b0 * a01 + b1 * a11 + b2 * a21 + b3 * a31;
      out[2] = b0 * a02 + b1 * a12 + b2 * a22 + b3 * a32;
      out[3] = b0 * a03 + b1 * a13 + b2 * a23 + b3 * a33;
      b0 = b[4]; b1 = b[5]; b2 = b[6]; b3 = b[7];
      out[4] = b0 * a00 + b1 * a10 + b2 * a20 + b3 * a30;
      out[5] = b0 * a01 + b1 * a11 + b2 * a21 + b3 * a31;
      out[6] = b0 * a02 + b1 * a12 + b2 * a22 + b3 * a32;
      out[7] = b0 * a03 + b1 * a13 + b2 * a23 + b3 * a33;
      b0 = b[8]; b1 = b[9]; b2 = b[10]; b3 = b[11];
      out[8] = b0 * a00 + b1 * a10 + b2 * a20 + b3 * a30;
      out[9] = b0 * a01 + b1 * a11 + b2 * a21 + b3 * a31;
      out[10] = b0 * a02 + b1 * a12 + b2 * a22 + b3 * a32;
      out[11] = b0 * a03 + b1 * a13 + b2 * a23 + b3 * a33;
      b0 = b[12]; b1 = b[13]; b2 = b[14]; b3 = b[15];
      out[12] = b0 * a00 + b1 * a10 + b2 * a20 + b3 * a30;
      out[13] = b0 * a01 + b1 * a11 + b2 * a21 + b3 * a31;
      out[14] = b0 * a02 + b1 * a12 + b2 * a22 + b3 * a32;
      out[15] = b0 * a03 + b1 * a13 + b2 * a23 + b3 * a33;
      return out;
    }

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const width = Math.floor(canvas.clientWidth * dpr);
      const height = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
        gl.viewport(0, 0, width, height);
      }
    }

    function currentMVP() {
      const aspect = canvas.width / Math.max(1, canvas.height);
      const projection = mat4Perspective(Math.PI / 4.2, aspect, 0.1, 80);
      const cp = Math.cos(state.pitch);
      const eye = [
        state.distance * Math.sin(state.yaw) * cp,
        state.distance * Math.sin(state.pitch) - 0.8,
        state.distance * Math.cos(state.yaw) * cp
      ];
      const view = mat4LookAt(eye, [0, -1.9, 0], [0, 1, 0]);
      return mat4Multiply(projection, view);
    }

    function drawBuffer(buffer, count, mode, pointSize, roundPoints, depth) {
      if (!count) return;
      if (depth) gl.enable(gl.DEPTH_TEST);
      else gl.disable(gl.DEPTH_TEST);
      bindBuffer(buffer);
      gl.uniform1f(locations.pointSize, pointSize);
      gl.uniform1i(locations.roundPoints, roundPoints ? 1 : 0);
      gl.drawArrays(mode, 0, count);
    }

    let diskBuffer = null;
    let horizonBuffer = null;
    let pointBuffer = null;
    let trailBuffer = null;
    let blackHoleBuffer = null;

    function updateMetrics() {
      let norm2 = 0;
      let total = 0;
      for (const p of particles) {
        const q = p.info * p.info;
        norm2 += q;
        total += q;
      }
      const norm = Math.sqrt(norm2 / particles.length);
      let entropy = 0;
      for (const p of particles) {
        const q = p.info * p.info / Math.max(total, 1e-9);
        entropy -= q > 0 ? q * Math.log(q) : 0;
      }
      const normalizedEntropy = entropy / Math.log(particles.length);
      const loss = state.mode === "unitary"
        ? Math.max(0, Math.abs(1 - norm) * 0.12)
        : state.mode === "projection"
          ? clamp((1 - state.rank) * (1.02 - norm), 0, 1)
          : clamp(1 - norm, 0, 1);
      const rho = state.mode === "kernel" ? 0.78 : 1.0;

      document.getElementById("normMetric").textContent = norm.toFixed(3);
      document.getElementById("entropyMetric").textContent = normalizedEntropy.toFixed(3);
      document.getElementById("lossMetric").textContent = loss.toFixed(3);
      document.getElementById("rhoMetric").textContent = rho.toFixed(3);
      document.getElementById("particleMetric").textContent = String(particles.length);
    }

    function render(now) {
      const seconds = now * 0.001;
      const dt = Math.min(0.033, seconds - state.time || 0.016);
      state.time = seconds;
      resize();
      updateParticles(dt);
      if (state.gridDirty) rebuildGrid();

      const mvp = currentMVP();
      gl.uniformMatrix4fv(locations.mvp, false, mvp);
      gl.clearColor(0.025, 0.032, 0.052, 1);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
      gl.lineWidth(1);

      const disk = buildAccretionDisk();
      const horizon = buildHorizon();
      const particleData = buildParticleBuffers();
      const blackHole = [];
      pushVertex(blackHole, 0, 0, well(0, 0) + 0.12, 0, 0, 0, 1);

      if (!diskBuffer) diskBuffer = makeBuffer(disk); else updateBuffer(diskBuffer, disk);
      if (!horizonBuffer) horizonBuffer = makeBuffer(horizon); else updateBuffer(horizonBuffer, horizon);
      if (!trailBuffer) trailBuffer = makeBuffer(particleData.trails); else updateBuffer(trailBuffer, particleData.trails);
      if (!pointBuffer) pointBuffer = makeBuffer(particleData.points); else updateBuffer(pointBuffer, particleData.points);
      if (!blackHoleBuffer) blackHoleBuffer = makeBuffer(blackHole); else updateBuffer(blackHoleBuffer, blackHole);

      drawBuffer(gridBuffer, gridVertexCount, gl.LINES, 1, false, true);
      drawBuffer(diskBuffer, disk.length / 7, gl.LINES, 1, false, true);
      drawBuffer(horizonBuffer, horizon.length / 7, gl.LINES, 1, false, false);
      drawBuffer(trailBuffer, particleData.trails.length / 7, gl.LINES, 1, false, true);
      drawBuffer(pointBuffer, particleData.points.length / 7, gl.POINTS, 7.5, true, false);
      drawBuffer(blackHoleBuffer, 1, gl.POINTS, 42, true, false);

      updateMetrics();
      requestAnimationFrame(render);
    }

    function setMode(mode) {
      state.mode = mode;
      for (const button of document.querySelectorAll("[data-mode]")) {
        button.classList.toggle("active", button.dataset.mode === mode);
      }
      const title = mode === "unitary" ? "Unitary" : mode === "projection" ? "Projection" : "Kernel";
      const copy = {
        unitary: "The global state rotates through phase and curvature while the norm remains approximately fixed.",
        projection: "Low-rank dimensional reduction discards unresolved modes crossing the throat.",
        kernel: "Smoothing plus horizon absorption contracts amplitudes and makes inversion ill-conditioned."
      };
      document.getElementById("modeName").textContent = title;
      document.getElementById("modeCopy").textContent = copy[mode];
    }

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    document.getElementById("curvature").addEventListener("input", (event) => {
      state.curvature = Number(event.target.value);
      state.gridDirty = true;
    });
    document.getElementById("flux").addEventListener("input", (event) => {
      state.flux = Number(event.target.value);
    });
    document.getElementById("rank").addEventListener("input", (event) => {
      state.rank = Number(event.target.value);
    });

    canvas.addEventListener("pointerdown", (event) => {
      state.dragging = true;
      state.lastX = event.clientX;
      state.lastY = event.clientY;
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!state.dragging) return;
      const dx = event.clientX - state.lastX;
      const dy = event.clientY - state.lastY;
      state.lastX = event.clientX;
      state.lastY = event.clientY;
      state.yaw += dx * 0.006;
      state.pitch = clamp(state.pitch + dy * 0.004, -0.24, 1.08);
    });

    canvas.addEventListener("pointerup", (event) => {
      state.dragging = false;
      canvas.releasePointerCapture(event.pointerId);
    });

    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      state.distance = clamp(state.distance + event.deltaY * 0.012, 7.0, 18.0);
    }, { passive: false });

    window.addEventListener("resize", resize);
    rebuildGrid();
    requestAnimationFrame(render);
  </script>
</body>
</html>
